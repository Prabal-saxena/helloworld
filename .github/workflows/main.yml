name: GitHub Actions Maven Build Example

on:
  push:
    branches: [ master ]
jobs:

  build-on-windows:
    # The type of the runner that the job will run on
    runs-on: windows-latest
    
    # Steps 
    steps:
      - name: Step 1- Checkout master branch from github
        uses: actions/checkout@v1
        
      - name: Step 2- Set up JDK 1.8
        uses: actions/setup-java@v1
        with: 
          java-version: 1.8
          
      - name: Step 3- Have Github actions build Maven Project
        run: mvn -B package --file pom.xml
        
      - name: Step 4- List the environment Variables
        run: env

      - name: Create a Artifact folder
        run: mkdir target

      - name: Add artifacts to publish to the temp folder
        run: |
          cd target
          echo classes
          cd..

      - name: use the upload artifact Github action
        uses: actions/upload-artifact@v2
        with:
          path: target
